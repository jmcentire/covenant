name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: install
        run: npm ci
      - name: lint
        run: npm --workspace=ts run lint
      - name: test
        run: npm --workspace=ts run test
      - name: covenant-export --check
        run: npm --workspace=ts run export:check
      - name: build
        run: npm --workspace=ts run build

  py:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: pytest
        run: pytest -v

  drift:
    name: TS export drift gate
    runs-on: ubuntu-latest
    needs: ts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: install
        run: npm ci
      - name: ensure round-trip is idempotent
        run: |
          npm --workspace=ts run export
          if ! git diff --quiet -- contracts; then
            echo 'covenant-export produced a diff. Re-run locally and commit.'
            git diff -- contracts
            exit 1
          fi
