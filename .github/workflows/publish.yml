# Canonical npm publish workflow.
# Trusted Publishing (OIDC) — no NPM_TOKEN. Set up the package on npmjs.com:
#   Settings -> Publishing access -> GitHub Actions ->
#     repository: <owner>/<repo>
#     workflow:   .github/workflows/publish.yml
#     environment: npm-publish
#
# Trigger: a published GitHub Release. Tag the commit, push the tag,
# `gh release create <tag>` (or click "Publish release" in the UI).
#
# If the package lives in a subdirectory, set `working-directory:` on the
# `run` steps and `cache-dependency-path:` on setup-node.

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
